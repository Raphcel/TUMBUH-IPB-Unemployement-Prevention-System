services:
  backend:
    ports:
      - "8000:8000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
      FRONTEND_URL: http://localhost:8080

  frontend:
    ports:
      - "8080:80"
    build:
      args:
        VITE_API_URL: /api/v1

  audit-log:
    ports:
      - "3001:3001"
